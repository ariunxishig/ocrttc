<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Зураг → Текст → Дуу</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;
  --border:#2e2e2e;--accent:#e8d5a3;--text:#f0ece0;
  --muted:#888;--danger:#e05555;--success:#5eb87a;--radius:12px
}
body{background:var(--bg);color:var(--text);font-family:sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
header{width:100%;padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.logo{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
header h1{font-size:16px;font-weight:600}
header p{font-size:12px;color:var(--muted)}
main{width:100%;max-width:480px;padding:20px 16px;display:flex;flex-direction:column;gap:14px}

/* Upload */
#upload-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px 20px;text-align:center}
#upload-card .icon{font-size:40px;display:block;margin-bottom:12px}
#upload-card h2{font-size:15px;font-weight:600;margin-bottom:6px}
#upload-card p{font-size:13px;color:var(--muted);margin-bottom:16px}
#upload-label{display:inline-block;padding:12px 28px;background:var(--accent);color:#1a1400;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
#file-input{display:none}

/* Preview */
#preview-card{display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
#preview-img{width:100%;max-height:260px;object-fit:contain;background:#000;display:block}
#preview-bar{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border)}
#preview-bar span{font-size:12px;color:var(--muted)}
#change-btn{font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer}

/* Extract btn */
#extract-btn{display:none;width:100%;padding:15px;font-size:15px;font-weight:600;border-radius:var(--radius);border:none;background:var(--accent);color:#1a1400;cursor:pointer}
#extract-btn:disabled{opacity:0.5}

/* Status */
#status{display:none;padding:12px;border-radius:var(--radius);font-size:13px;text-align:center}
#status.info{background:#1a2a3a;color:#7ab8e8;border:1px solid #2a4a6a}
#status.success{background:#1a2e1e;color:var(--success);border:1px solid #2a4a30}
#status.error{background:#2e1a1a;color:var(--danger);border:1px solid #4a2a2a}

/* Result */
#result-card{display:none;flex-direction:column;gap:12px}
#text-area{width:100%;min-height:150px;resize:vertical;padding:12px;font-size:14px;line-height:1.8;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:sans-serif}
#voice-info{font-size:12px;color:var(--muted);text-align:center}

/* Controls */
.speed-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:10px}
.speed-row label{font-size:13px;color:var(--muted);min-width:36px}
.speed-row input{flex:1;accent-color:var(--accent)}
.speed-row span{font-size:13px;color:var(--muted);min-width:32px;text-align:right}

/* Play buttons */
.play-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.play-btns button{padding:12px 0;font-size:14px;font-weight:500;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer}
.play-btns button:disabled{opacity:0.4;cursor:not-allowed}
#play-btn{background:var(--accent)!important;color:#1a1400!important;border-color:var(--accent)!important;font-weight:600!important}

.progress-wrap{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
#progress-bar{height:100%;width:0%;background:var(--accent);transition:width 0.3s}
#progress-status{font-size:11px;color:var(--muted);text-align:center}
</style>
</head>
<body>

<header>
  <div class="logo">📖</div>
  <div>
    <h1>Зураг → Текст → Дуу</h1>
    <p>Зураг оруулахад текст гаргаж уншиж өгнө</p>
  </div>
</header>

<main>
  <div id="upload-card">
    <span class="icon">🖼️</span>
    <h2>Зураг сонгох</h2>
    <p>Gallery эсвэл камераас зураг сонгоно уу</p>
    <label id="upload-label" for="file-input">📂 Зураг сонгох</label>
    <input type="file" id="file-input" accept="image/*">
  </div>

  <div id="preview-card">
    <img id="preview-img" alt="preview">
    <div id="preview-bar">
      <span id="file-name">—</span>
      <button id="change-btn">Өөрчлөх</button>
    </div>
  </div>

  <button id="extract-btn">✦ Текст гаргаж, уншуулах</button>

  <div id="status"></div>

  <div id="result-card">
    <textarea id="text-area" placeholder="Текст энд гарна..."></textarea>
    <div id="voice-info"></div>
    <div class="speed-row">
      <label>Хурд</label>
      <input type="range" id="speed" min="0.5" max="2" step="0.1" value="0.9">
      <span id="speed-val">0.9x</span>
    </div>
    <div class="play-btns">
      <button id="play-btn">▶ Унших</button>
      <button id="pause-btn" disabled>⏸ Зогс</button>
      <button id="stop-btn" disabled>⏹ Болих</button>
    </div>
    <div class="progress-wrap"><div id="progress-bar"></div></div>
    <div id="progress-status"></div>
  </div>
</main>

<script>
// ---- Voice ----
var voices = [], selectedVoice = null, chunks = [], stopped = false, isPaused = false;

function loadVoices() {
  var v = speechSynthesis.getVoices();
  if (!v.length) return;
  voices = v;
  selectedVoice = null;
  var prefer = ['kk','ru','tr','mn'];
  for (var p = 0; p < prefer.length; p++) {
    for (var i = 0; i < voices.length; i++) {
      if (voices[i].lang.startsWith(prefer[p])) { selectedVoice = voices[i]; break; }
    }
    if (selectedVoice) break;
  }
  document.getElementById('voice-info').textContent = selectedVoice
    ? 'Дуу: ' + selectedVoice.name + ' (' + selectedVoice.lang + ')'
    : 'Системийн өгөгдмөл дуу';
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();
setTimeout(loadVoices, 300);
setTimeout(loadVoices, 1000);

// ---- Speed ----
document.getElementById('speed').oninput = function () {
  document.getElementById('speed-val').textContent = parseFloat(this.value).toFixed(1) + 'x';
};

// ---- File ----
function handleFileInput(el) {
  var file = (el || this).files && (el || this).files[0];
  if (!file) return;
  window._file = file;
  var reader = new FileReader();
  reader.onload = function (e) {
    document.getElementById('preview-img').src = e.target.result;
    document.getElementById('preview-card').style.display = 'block';
    document.getElementById('upload-card').style.display = 'none';
    document.getElementById('file-name').textContent = file.name || 'зураг';
    document.getElementById('extract-btn').style.display = 'block';
    document.getElementById('result-card').style.display = 'none';
    document.getElementById('status').style.display = 'none';
    stopSpeech();
  };
  reader.readAsDataURL(file);
}
var fi = document.getElementById('file-input');
fi.addEventListener('change', function(e){ handleFileInput(e.target); });
fi.addEventListener('input', function(e){ handleFileInput(e.target); });

document.getElementById('change-btn').onclick = function () {
  document.getElementById('preview-card').style.display = 'none';
  document.getElementById('upload-card').style.display = 'block';
  document.getElementById('extract-btn').style.display = 'none';
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('status').style.display = 'none';
  document.getElementById('file-input').value = '';
  window._file = null;
  stopSpeech();
};

// ---- Extract ----
document.getElementById('extract-btn').onclick = async function () {
  if (!window._file) return;
  var btn = this;
  btn.disabled = true; btn.textContent = 'Уншиж байна...';
  showStatus('Claude зурагнаас текст гаргаж байна...', 'info');

  var base64 = await new Promise(function (res) {
    var r = new FileReader();
    r.onload = function (e) { res(e.target.result.split(',')[1]); };
    r.readAsDataURL(window._file);
  });

  try {
    var resp = await fetch('/api/extract', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: base64, mimeType: window._file.type || 'image/jpeg' })
    });
    var data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Алдаа');
    if (!data.text) throw new Error('Текст олдсонгүй');
    document.getElementById('text-area').value = data.text;
    document.getElementById('result-card').style.display = 'flex';
    showStatus('Текст гарлаа!', 'success');
    setTimeout(playSpeech, 500);
  } catch (err) {
    showStatus('Алдаа: ' + err.message, 'error');
  }
  btn.disabled = false; btn.textContent = '✦ Текст гаргаж, уншуулах';
};

function showStatus(msg, type) {
  var s = document.getElementById('status');
  s.textContent = msg; s.className = type; s.style.display = 'block';
}

// ---- TTS ----
function splitChunks(text) {
  var res = [];
  text.split('\n').forEach(function (line) {
    line = line.trim(); if (!line) return;
    var parts = line.match(/[^.!?]+[.!?]*/g) || [line];
    parts.forEach(function (p) { p = p.trim(); if (p) res.push(p); });
  });
  return res;
}

function setButtons(playing) {
  document.getElementById('play-btn').disabled = playing;
  document.getElementById('pause-btn').disabled = !playing;
  document.getElementById('stop-btn').disabled = !playing;
}

function speakChunk(idx) {
  if (stopped || idx >= chunks.length) {
    if (!stopped) { document.getElementById('progress-bar').style.width = '100%'; document.getElementById('progress-status').textContent = 'Дууслаа.'; }
    setButtons(false); return;
  }
  document.getElementById('progress-bar').style.width = Math.round(idx / chunks.length * 100) + '%';
  document.getElementById('progress-status').textContent = (idx + 1) + ' / ' + chunks.length;
  var u = new SpeechSynthesisUtterance(chunks[idx]);
  u.rate = parseFloat(document.getElementById('speed').value);
  if (selectedVoice) u.voice = selectedVoice;
  u.onend = function () { if (!stopped && !isPaused) speakChunk(idx + 1); };
  u.onerror = function (e) { if (e.error !== 'interrupted') { setButtons(false); } };
  speechSynthesis.speak(u);
}

function playSpeech() {
  var txt = document.getElementById('text-area').value.trim();
  if (!txt) return;
  speechSynthesis.cancel();
  chunks = splitChunks(txt); stopped = false; isPaused = false;
  setButtons(true);
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('progress-status').textContent = '';
  speakChunk(0);
}

function stopSpeech() {
  stopped = true; isPaused = false; speechSynthesis.cancel(); setButtons(false);
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('progress-status').textContent = '';
  document.getElementById('pause-btn').textContent = '⏸ Зогс';
}

document.getElementById('play-btn').onclick = playSpeech;
document.getElementById('stop-btn').onclick = stopSpeech;
document.getElementById('pause-btn').onclick = function () {
  if (!isPaused) {
    speechSynthesis.pause(); isPaused = true; this.textContent = '▶ Үргэл';
  } else {
    speechSynthesis.resume(); isPaused = false; this.textContent = '⏸ Зогс';
  }
};
</script>
</body>
</html>
