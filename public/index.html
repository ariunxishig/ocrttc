<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Зураг → Текст → Дуу</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Mongolian&family=Inter:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #e8d5a3;
    --accent2: #c4a96b;
    --text: #f0ece0;
    --muted: #888;
    --danger: #e05555;
    --success: #5eb87a;
    --radius: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
  }

  header {
    width: 100%;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }

  header p {
    font-size: 12px;
    color: var(--muted);
  }

  main {
    width: 100%;
    max-width: 480px;
    padding: 24px 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  /* Upload zone */
  #upload-zone {
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
  }

  #upload-zone:active { background: var(--surface2); }

  #upload-zone .icon {
    font-size: 40px;
    margin-bottom: 12px;
    display: block;
  }

  #upload-zone h2 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  #upload-zone p {
    font-size: 13px;
    color: var(--muted);
  }


  /* Preview */
  #preview-wrap { display: none; }

  #preview-img {
    width: 100%;
    max-height: 280px;
    object-fit: contain;
    background: #000;
    display: block;
  }

  .preview-bar {
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
  }

  .preview-bar span {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 60%;
  }

  .btn-small {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    white-space: nowrap;
  }

  /* Extract button */
  #extract-btn {
    width: 100%;
    padding: 15px;
    font-size: 15px;
    font-weight: 600;
    border-radius: var(--radius);
    border: none;
    background: var(--accent);
    color: #1a1400;
    cursor: pointer;
    display: none;
    transition: opacity 0.2s, transform 0.1s;
  }

  #extract-btn:active { transform: scale(0.98); }
  #extract-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Status */
  #status {
    display: none;
    padding: 12px 14px;
    border-radius: var(--radius);
    font-size: 13px;
    text-align: center;
  }

  #status.info { background: #1a2a3a; color: #7ab8e8; border: 1px solid #2a4a6a; }
  #status.success { background: #1a2e1e; color: var(--success); border: 1px solid #2a4a30; }
  #status.error { background: #2e1a1a; color: var(--danger); border: 1px solid #4a2a2a; }

  /* Result */
  #result-wrap { display: none; flex-direction: column; gap: 12px; }

  #text-area {
    width: 100%;
    min-height: 160px;
    resize: vertical;
    padding: 14px;
    font-size: 14px;
    line-height: 1.8;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Inter', sans-serif;
  }

  #text-area:focus { outline: none; border-color: var(--accent2); }

  /* Controls */
  .controls {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .control-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .control-row label {
    font-size: 12px;
    color: var(--muted);
    min-width: 36px;
  }

  select, input[type=range] {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 12px;
    padding: 6px 8px;
  }

  select:focus { outline: none; border-color: var(--accent2); }

  input[type=range] {
    padding: 0;
    height: 4px;
    accent-color: var(--accent);
  }

  .speed-val {
    font-size: 12px;
    color: var(--muted);
    min-width: 32px;
    text-align: right;
  }

  /* Play buttons */
  .play-btns {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  .play-btns button {
    padding: 12px 0;
    font-size: 14px;
    font-weight: 500;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s;
  }

  .play-btns button:active { background: var(--border); }
  .play-btns button:disabled { opacity: 0.4; cursor: not-allowed; }

  #play-btn {
    background: var(--accent) !important;
    color: #1a1400 !important;
    border-color: var(--accent) !important;
    font-weight: 600 !important;
  }

  /* Progress */
  .progress-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  #progress-bar {
    height: 100%;
    width: 0%;
    background: var(--accent);
    transition: width 0.3s;
  }

  #progress-status {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }

  /* Camera button */
  .camera-btn {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(232,213,163,0.3);
    transition: transform 0.15s;
  }

  .camera-btn:active { transform: scale(0.93); }
</style>
</head>
<body>

<header>
  <div class="logo">📖</div>
  <div>
    <h1>Зураг → Текст → Дуу</h1>
    <p>Зураг оруулахад текст гаргаж, уншиж өгнө</p>
  </div>
</header>

<main>
  <!-- Upload -->
  <div class="card">
    <div id="upload-zone">
      <span class="icon">🖼️</span>
      <h2>Зураг сонгох</h2>
      <p>Товч дарж gallery эсвэл камераас сонгоно уу</p>
      <label for="file-input" style="display:inline-block;margin-top:14px;padding:12px 28px;background:var(--accent);color:#1a1400;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;">📂 Зураг сонгох</label>
      <input type="file" id="file-input" accept="image/*" style="display:none;">
    </div>
    <div id="preview-wrap">
      <img id="preview-img" alt="preview">
      <div class="preview-bar">
        <span id="file-name">—</span>
        <button class="btn-small" onclick="resetUpload()">Өөрчлөх</button>
      </div>
    </div>
  </div>

  <button id="extract-btn" onclick="extractText()">✦ Текст гаргаж, уншуулах</button>

  <div id="status"></div>

  <div id="result-wrap">
    <textarea id="text-area" placeholder="Текст энд гарна..."></textarea>

    <div class="controls">
      <div id="voice-info" style="font-size:12px;color:var(--muted);padding:2px 0;"></div>
      <div class="control-row">
        <label>Хурд</label>
        <input type="range" id="speed-slider" min="0.5" max="2" step="0.1" value="0.9">
        <span class="speed-val" id="speed-val">0.9x</span>
      </div>
    </div>

    <div class="play-btns">
      <button id="play-btn" onclick="playSpeech()">▶ Унших</button>
      <button id="pause-btn" onclick="pauseSpeech()" disabled>⏸ Зогс</button>
      <button id="stop-btn" onclick="stopSpeech()" disabled>⏹ Болих</button>
    </div>

    <div class="progress-wrap">
      <div id="progress-bar"></div>
    </div>
    <div id="progress-status"></div>
  </div>
</main>

<button class="camera-btn" onclick="document.getElementById('file-input').click()" title="Камер">📷</button>

<script>
var voices = [], chunks = [], chunkIdx = 0, stopped = false, isPaused = false;

// Voices
function loadVoices() {
  voices = speechSynthesis.getVoices();
  var sel = document.getElementById('voice-select');
  sel.innerHTML = '';
  var preferred = ['kk','ru','tr','mn'];
  var sorted = voices.slice().sort(function(a,b){
    var ai = preferred.findIndex(function(l){return a.lang.startsWith(l);}),
        bi = preferred.findIndex(function(l){return b.lang.startsWith(l);});
    if(ai<0)ai=99; if(bi<0)bi=99;
    return ai-bi;
  });
  sorted.forEach(function(v){
    var o=document.createElement('option');
    o.value=voices.indexOf(v);
    o.textContent=v.name+' ('+v.lang+')';
    var o=document.createElement('option');
    o.value=voices.indexOf(v);
    o.textContent=v.name+' ('+v.lang+')';
    sel.appendChild(o);
  });
  // kk эсвэл ru-г default болгох
  for(var i=0; i<sel.options.length; i++){
    var txt = sel.options[i].textContent;
    if(txt.indexOf('(kk') !== -1 || txt.indexOf('(ru') !== -1){
      sel.selectedIndex = i;
      break;
    }
  }
}
loadVoices();
speechSynthesis.onvoiceschanged = loadVoices;

// Speed
document.getElementById('speed-slider').oninput = function(){
  document.getElementById('speed-val').textContent = parseFloat(this.value).toFixed(1)+'x';
};

// File
function handleFile(file) {
  if(!file) return;
  window._file = file;
  var reader = new FileReader();
  reader.onload = function(ev){
    document.getElementById('preview-img').src = ev.target.result;
    document.getElementById('preview-wrap').style.display = 'block';
    document.getElementById('upload-zone').style.display = 'none';
    document.getElementById('file-name').textContent = file.name || 'зураг';
    document.getElementById('extract-btn').style.display = 'block';
    document.getElementById('result-wrap').style.display = 'none';
    document.getElementById('status').style.display = 'none';
    stopSpeech();
  };
  reader.onerror = function(){ showStatus('Зураг уншихад алдаа гарлаа','error'); };
  reader.readAsDataURL(file);
}
var fileInput = document.getElementById('file-input');
fileInput.addEventListener('change', function(e){
  var file = e.target.files && e.target.files[0];
  if(file) handleFile(file);
});

function resetUpload(){
  document.getElementById('preview-wrap').style.display='none';
  document.getElementById('upload-zone').style.display='block';
  document.getElementById('extract-btn').style.display='none';
  document.getElementById('result-wrap').style.display='none';
  document.getElementById('status').style.display='none';
  document.getElementById('file-input').value='';
  window._file=null;
  stopSpeech();
}

function showStatus(msg,type){
  var s=document.getElementById('status');
  s.textContent=msg; s.className=type; s.style.display='block';
}

// Extract
async function extractText(){
  if(!window._file) return;
  var btn=document.getElementById('extract-btn');
  btn.disabled=true; btn.textContent='Уншиж байна...';
  showStatus('Claude зурагнаас текст гаргаж авч байна...','info');
  document.getElementById('result-wrap').style.display='none';

  var file=window._file;
  var base64 = await new Promise(function(res){
    var r=new FileReader();
    r.onload=function(e){ res(e.target.result.split(',')[1]); };
    r.readAsDataURL(file);
  });

  var mime = file.type||'image/jpeg';

  try {
    var resp = await fetch('/api/extract',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({image:base64, mimeType:mime})
    });
    var data = await resp.json();
    if(!resp.ok) throw new Error(data.error||'Алдаа');
    if(!data.text) throw new Error('Текст олдсонгүй');

    document.getElementById('text-area').value = data.text;
    document.getElementById('result-wrap').style.display='flex';
    showStatus('Текст гарлаа! Уншуулж байна...','success');

    // Auto play
    setTimeout(function(){ playSpeech(); }, 500);

  } catch(err){
    showStatus('Алдаа: '+err.message,'error');
  }

  btn.disabled=false; btn.textContent='✦ Текст гаргаж, уншуулах';
}

// TTS
function splitChunks(text){
  var res=[];
  text.split('\n').forEach(function(line){
    line=line.trim(); if(!line) return;
    var parts=line.match(/[^.!?]+[.!?]*/g)||[line];
    parts.forEach(function(p){ p=p.trim(); if(p) res.push(p); });
  });
  return res;
}

function setButtons(playing){
  document.getElementById('play-btn').disabled=playing;
  document.getElementById('pause-btn').disabled=!playing;
  document.getElementById('stop-btn').disabled=!playing;
}

function speakChunk(idx){
  if(stopped||idx>=chunks.length){
    if(!stopped){
      document.getElementById('progress-bar').style.width='100%';
      document.getElementById('progress-status').textContent='Дууслаа.';
    }
    setButtons(false); return;
  }
  document.getElementById('progress-bar').style.width=Math.round(idx/chunks.length*100)+'%';
  document.getElementById('progress-status').textContent=(idx+1)+' / '+chunks.length;

  var u=new SpeechSynthesisUtterance(chunks[idx]);
  u.rate=parseFloat(document.getElementById('speed-slider').value);
  if(selectedVoice) u.voice=selectedVoice;

  u.onend=function(){ if(!stopped&&!isPaused) speakChunk(idx+1); else chunkIdx=idx+1; };
  u.onerror=function(e){ if(e.error!=='interrupted'){ setButtons(false); document.getElementById('progress-status').textContent='Алдаа: '+e.error; } };
  speechSynthesis.speak(u);
}

function playSpeech(){
  var txt=document.getElementById('text-area').value.trim();
  if(!txt) return;
  speechSynthesis.cancel();
  chunks=splitChunks(txt); stopped=false; isPaused=false;
  setButtons(true);
  document.getElementById('progress-bar').style.width='0%';
  document.getElementById('progress-status').textContent='';
  speakChunk(0);
}

function pauseSpeech(){
  if(!isPaused){
    speechSynthesis.pause(); isPaused=true;
    document.getElementById('pause-btn').textContent='▶ Үргэл';
  } else {
    speechSynthesis.resume(); isPaused=false;
    document.getElementById('pause-btn').textContent='⏸ Зогс';
  }
}

function stopSpeech(){
  stopped=true; isPaused=false;
  speechSynthesis.cancel(); setButtons(false);
  document.getElementById('pause-btn').textContent='⏸ Зогс';
  document.getElementById('progress-bar').style.width='0%';
  document.getElementById('progress-status').textContent='';
}
</script>
</body>
</html>
